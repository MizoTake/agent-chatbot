version: 1

agents:
  local_llm:
    mode: "cli"
    model: "lmstudio/text-embedding-nomic-embed-text-v1.5"
    cli:
      command: "bash"
      args: ["scripts/opencode-monitor.sh", "run", "--thinking", "--format=json"]
      model_arg: "-m"
      ensure_no_permission_flags: true

  local_llm_reviewer:
    mode: "cli"
    model: "lmstudio/text-embedding-nomic-embed-text-v1.5"
    cli:
      command: "bash"
      args: ["scripts/opencode-monitor.sh", "run", "--thinking", "--format=json"]
      model_arg: "-m"
      ensure_no_permission_flags: true


  claude:
    mode: "cli"
    cli:
      command: "claude.cmd"
      args: ["-p"]
      prompt_via_stdin: true
      model_arg: null
      ensure_no_permission_flags: true
  gemini:
    mode: "cli"
    cli:
      command: "gemini.cmd"
      args: ["-p"]
      prompt_via_stdin: true
      model_arg: null
      ensure_no_permission_flags: true
  codex:
    mode: "cli"
    cli:
      command: "codex.cmd"
      args: ["exec", "--skip-git-repo-check"]
      prompt_via_stdin: true
      model_arg: null
      ensure_no_permission_flags: true

execution:
  profile: "opencode_impl_no_review"
  profile_strategy:
    alternating:
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
      - "local_only"
    every_n_cycles: []
    mixins: []
  acceptance_criteria:
    # Regression guard
    - "TypeScript compilation (`npx tsc --noEmit`) passes with no errors."
    - "`ToolCLIClient` correctly builds args with `{prompt}` placeholder substitution and appends prompt when no placeholder exists."
    - "`ToolCLIClient` auto-injects standard execution options per tool (e.g. `--dangerously-skip-permissions` for claude, `--sandbox danger-full-access` for codex, `-y` for vibe-local)."
    - "`ToolCLIClient.checkAvailability` returns `true` for reachable CLIs and `false` for missing ones."
    - "`ToolPreferenceService` persists and retrieves per-channel tool preferences, and `clearChannelTool` returns correct deletion status."
    - "`BotManager` routes `/agent` commands through `ToolCLIClient` with proper working directory and tool selection."
    - "All existing unit tests (`npm test`) pass."
    # Feature: /agent-repo create
    - "`/agent-repo create <name>` creates a new `git init`-ed repository under `repositories/`, makes an initial empty commit on `main`, and links it to the channel via `StorageService`."
    - "After creation, `/agent` commands in that channel execute inside the new repository's working directory."
    - "Duplicate repo name for the same channel returns an error without overwriting."
    - "Invalid repo names (path traversal, special characters) are rejected with a validation error."
    - "Unit tests cover successful creation, duplicate rejection, and invalid name rejection."
  verification:
    commands:
      - "npm run typecheck"
      - "npm test"
      - "git log --oneline -1"
